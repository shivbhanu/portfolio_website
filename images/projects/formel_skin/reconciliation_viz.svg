<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">

  <!-- Background -->
  <rect width="1600" height="900" fill="#eef0f7"/>

  <!-- Title -->
  <text x="800" y="78" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#2c3e50" text-anchor="middle">Revenue Gap Analysis</text>
  <text x="800" y="122" font-family="Arial, sans-serif" font-size="26" fill="#7f8c8d" text-anchor="middle">€19,500 total discrepancy · 5 discrepancy categories identified</text>

  <!-- Divider -->
  <line x1="200" y1="145" x2="1400" y2="145" stroke="#d0d4e0" stroke-width="1.5"/>

  <!-- Bar 1: Orphan Refunds 72% — width 810px (72% of 900) -->
  <text x="390" y="262" font-family="Arial, sans-serif" font-size="26" fill="#444" text-anchor="end" dominant-baseline="middle">Orphan Refunds</text>
  <rect x="400" y="225" width="810" height="64" rx="6" fill="#e07070"/>
  <text x="1220" y="262" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#c0392b" dominant-baseline="middle">72%</text>

  <!-- Bar 2: Currency Mismatches 16% — width 180px -->
  <text x="390" y="382" font-family="Arial, sans-serif" font-size="26" fill="#444" text-anchor="end" dominant-baseline="middle">Currency Mismatches</text>
  <rect x="400" y="345" width="180" height="64" rx="6" fill="#7090e0"/>
  <text x="592" y="382" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#2855b8" dominant-baseline="middle">16%</text>

  <!-- Bar 3: Missing Invoices 5% — width 56px -->
  <text x="390" y="502" font-family="Arial, sans-serif" font-size="26" fill="#444" text-anchor="end" dominant-baseline="middle">Missing Invoices</text>
  <rect x="400" y="465" width="56" height="64" rx="6" fill="#70c070"/>
  <text x="468" y="502" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#27ae60" dominant-baseline="middle">5%</text>

  <!-- Bar 4: Timing / Rounding 7% — width 79px -->
  <text x="390" y="622" font-family="Arial, sans-serif" font-size="26" fill="#444" text-anchor="end" dominant-baseline="middle">Timing / Rounding</text>
  <rect x="400" y="585" width="79" height="64" rx="6" fill="#b0b8c8"/>
  <text x="491" y="622" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#555" dominant-baseline="middle">7%</text>

  <!-- X axis baseline -->
  <line x1="400" y1="700" x2="1300" y2="700" stroke="#c0c8d8" stroke-width="1.5"/>

  <!-- X axis ticks: 0%, 20%, 40%, 60%, 80% — 900px wide, 1% = 11.25px -->
  <line x1="400"  y1="700" x2="400"  y2="712" stroke="#c0c8d8" stroke-width="1.5"/>
  <text x="400"  y="736" font-family="Arial, sans-serif" font-size="20" fill="#aaa" text-anchor="middle">0%</text>

  <line x1="625"  y1="700" x2="625"  y2="712" stroke="#c0c8d8" stroke-width="1.5"/>
  <text x="625"  y="736" font-family="Arial, sans-serif" font-size="20" fill="#aaa" text-anchor="middle">20%</text>

  <line x1="850"  y1="700" x2="850"  y2="712" stroke="#c0c8d8" stroke-width="1.5"/>
  <text x="850"  y="736" font-family="Arial, sans-serif" font-size="20" fill="#aaa" text-anchor="middle">40%</text>

  <line x1="1075" y1="700" x2="1075" y2="712" stroke="#c0c8d8" stroke-width="1.5"/>
  <text x="1075" y="736" font-family="Arial, sans-serif" font-size="20" fill="#aaa" text-anchor="middle">60%</text>

  <line x1="1300" y1="700" x2="1300" y2="712" stroke="#c0c8d8" stroke-width="1.5"/>
  <text x="1300" y="736" font-family="Arial, sans-serif" font-size="20" fill="#aaa" text-anchor="middle">80%</text>

  <!-- Axis label -->
  <text x="850" y="788" font-family="Arial, sans-serif" font-size="22" fill="#aaa" text-anchor="middle">Share of total revenue gap</text>

  <!-- Footer -->
  <text x="800" y="858" font-family="Arial, sans-serif" font-size="20" fill="#b0b8c8" text-anchor="middle">Formel Skin Case Study · SQL · BigQuery · Looker Studio</text>

</svg>
